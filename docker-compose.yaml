---
services:
  magento2:
    container_name: magento2
    image: sendsmaily/magneto2
    build:
      context: ./
    ports:
    - '8080:8000'
    environment:
    - MYSQL_HOST=db
    - MYSQL_DATABASE=magento2
    - MYSQL_USER=root
    - MYSQL_PASSWORD=root
    - MAGENTO_SAMPLEDATA=1
    - MAGENTO_LANGUAGE=et_EE
    - MAGENTO_TIMEZONE=Europe/Tallinn
    - MAGENTO_DEFAULT_CURRENCY=EUR
    - MAGENTO_URL=http://localhost:8080/ # Map also port for CSS/JS refs.
    - MAGENTO_BACKEND_FRONTNAME=admin
    - MAGENTO_ADMIN_EMAIL=admin@smaily.sandbox
    - MAGENTO_ADMIN_USERNAME=admin
    - MAGENTO_ADMIN_PASSWORD=smailydev1
    volumes:
    - data:/var/www/html
    - ./:/var/www/html/app/code/Smaily/SmailyForMagento
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  db:
    container_name: magento2_db
    image: mysql:8.4
    command: ["--tls-version=", "--admin-tls-version="]
    environment:
    - MYSQL_DATABASE=magento2
    - MYSQL_ROOT_PASSWORD=root
    volumes:
    - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-S", "/var/run/mysqld/mysqld.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nproc: 65535
      nofile:
        soft: 26677
        hard: 46677

  opensearch:
    container_name: magento2_opensearch
    image: opensearchproject/opensearch:2
    ports:
    - '9200:9200'
    - '9300:9300'
    environment:
    - discovery.type=single-node
    - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Smaily.dev1
    - DISABLE_SECURITY_PLUGIN=true
    volumes:
    - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    container_name: magento2_phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
    - '8888:80'
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
    - db

volumes:
  data:
    name: docker_magento2-data
  db-data:
    name: docker_magento2-db-data
  opensearch-data:
    name: docker_magento2-opensearch-data
